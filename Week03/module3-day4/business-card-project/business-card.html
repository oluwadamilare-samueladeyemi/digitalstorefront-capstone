<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Business Card - Samuel Adeyemi</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <article class="profile-card">

    <header class="card-header">
      <img src="asset/Samuels Potrait.jpeg" alt="Samuel Adeyemi Profile Picture" class="profile-img">

      <h1 class="name">Samuel Adeyemi</h1>
      <h2 class="title">Full Stack Developer</h2>
    </header>

    <section class="contact-info">
      <address class="contact-details">
        <a href="mailto:oluwadamilare.s.adeyemi@gmail.com" class="contact-link">oluwadamilare.s.adeyemi@gmail.com</a>
        <a href="tel:+2349019517925" class="contact-link">+2349019517925</a>
      </address>

      <div class="social-links">
        <a href="https://linkedin.com" class="btn">LinkedIn</a>
        <a href="https://github.com/oluwadamilare-samueladeyemi" class="btn btn-primary">GitHub</a>
      </div>
    </section>

    <footer class="card-footer">
      <footer class="card-footer">
      <img 
        src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://github.com/yourusername" 
        alt="QR Code linking to Alex Carter's GitHub Portfolio" 
        class="qr-code"
      >
      <p class="qr-text">Scan for Portfolio</p>
    </footer>

  </article>

</body>

</html>
