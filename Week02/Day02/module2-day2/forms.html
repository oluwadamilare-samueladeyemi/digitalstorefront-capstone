<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <title>Multi-Field Form</title>
</head>
<body>

    <main>
        <h1>Multi-Field Contact Form</h1>
        <p>Fill out the form below.</p>

        <form action="#" method="post">
            <div>
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>

                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone">
            </div>

            <label for="cars">Choose a car:</label>
                <select id="cars" name="cars">
                    <option value="volvo">Volvo</option>
                    <option value="BMW 3 Series">BMW 3 Series</option>
                    <option value="Mercedes S-Class">Mercedes S-Class</option>
                    <option value="Porsche 911">Porsche 911</option>
                    <option value="saab">Saab</option>
                    <option value="fiat">Fiat</option>
                    <option value="audi">Audi</option>
                </select>

            <div>
                <label for="track">Favorite Track</label>
                <select id="track" name="track">
                    <option value="">-- Select One --</option>
                    <option value="web">Web Development</option>
                    <option value="data">Data Analytics</option>
                    <option value="cyber">Cybersecurity</option>
                    <option value="ai">AI / Prompting</option>
                </select>
            </div>

            <fieldset>
                <legend>Contact Preference</legend>

                <div>
                    <input type="radio" id="prefEmail" name="contactPreference" value="email">
                    <label for="prefEmail">Email</label>
                </div>
                <br>
                <div>
                    <input type="radio" id="prefPhone" name="contactPreference" value="phone">
                    <label for="prefPhone">Phone</label>
                 </div>
                 <br>
                 <div>
                    <input type="checkbox" id="agree" name="agree" value="yes" required>
                    <label for="agree">I agree to the terms.</label>
                </div>
            </fieldset>

            <button type="submit">Submit</button>

       </form>
    </main>
</body>
</html>
